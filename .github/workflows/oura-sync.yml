name: Oura Auto-Sync

on:
  repository_dispatch:
    types: [oura-sync]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Sync Oura → HEALTH_DATABASE.json
        env:
          OURA_ACCESS_TOKEN:  ${{ secrets.OURA_ACCESS_TOKEN }}
          OURA_REFRESH_TOKEN: ${{ secrets.OURA_REFRESH_TOKEN }}
          OURA_CLIENT_ID:     ${{ secrets.OURA_CLIENT_ID }}
          OURA_CLIENT_SECRET: ${{ secrets.OURA_CLIENT_SECRET }}
          GH_TOKEN:           ${{ secrets.GH_PAT }}
          GH_REPO:            toddblackhurst/health-dashboard
        run: |
          python3 - <<'PYEOF'
          import json, os, subprocess, urllib.request, urllib.error
          from datetime import date, datetime, timezone, timedelta

          ACCESS_TOKEN  = os.environ["OURA_ACCESS_TOKEN"]
          REFRESH_TOKEN = os.environ["OURA_REFRESH_TOKEN"]
          CLIENT_ID     = os.environ["OURA_CLIENT_ID"]
          CLIENT_SECRET = os.environ["OURA_CLIENT_SECRET"]
          GH_REPO       = os.environ["GH_REPO"]
          TODAY         = date.today().isoformat()
          YESTERDAY     = (date.today() - timedelta(days=1)).isoformat()

          # ── Token refresh (runs if access token is expired) ──────────────
          def do_refresh():
              global ACCESS_TOKEN, REFRESH_TOKEN
              print("Access token expired — refreshing via OAuth2...")
              data = (
                  f"grant_type=refresh_token"
                  f"&refresh_token={REFRESH_TOKEN}"
                  f"&client_id={CLIENT_ID}"
                  f"&client_secret={CLIENT_SECRET}"
              ).encode()
              req = urllib.request.Request(
                  "https://api.ouraring.com/oauth/token",
                  data=data,
                  headers={"Content-Type": "application/x-www-form-urlencoded"}
              )
              with urllib.request.urlopen(req) as r:
                  tokens = json.loads(r.read())
              ACCESS_TOKEN  = tokens["access_token"]
              REFRESH_TOKEN = tokens["refresh_token"]
              # Store new tokens back to GitHub secrets
              subprocess.run(["gh", "secret", "set", "OURA_ACCESS_TOKEN",
                              "--repo", GH_REPO, "--body", ACCESS_TOKEN], check=True)
              subprocess.run(["gh", "secret", "set", "OURA_REFRESH_TOKEN",
                              "--repo", GH_REPO, "--body", REFRESH_TOKEN], check=True)
              print("Tokens refreshed and stored.")

          # ── Oura API call with auto-retry on 401 ────────────────────────
          def oura_get(path, start=None, end=None):
              s = start or TODAY
              e = end   or TODAY
              url = (f"https://api.ouraring.com/v2/usercollection/{path}"
                     f"?start_date={s}&end_date={e}")
              for attempt in range(2):
                  req = urllib.request.Request(
                      url, headers={"Authorization": f"Bearer {ACCESS_TOKEN}"}
                  )
                  try:
                      with urllib.request.urlopen(req) as r:
                          return json.loads(r.read())
                  except urllib.error.HTTPError as e:
                      if e.code == 401 and attempt == 0:
                          do_refresh()   # refresh and retry once
                      else:
                          print(f"Oura API error on {path}: {e.code}")
                          return {"data": []}

          # ── Fetch today's data from Oura ─────────────────────────────────
          readiness = oura_get("daily_readiness")
          sleep_day = oura_get("daily_sleep")
          sleep_raw = oura_get("sleep", start=YESTERDAY)   # span yesterday→today to catch overnight sessions

          # ── Parse values ─────────────────────────────────────────────────
          r_data         = readiness["data"][0] if readiness.get("data") else {}
          recovery_score = r_data.get("score")

          s_data      = sleep_day["data"][0] if sleep_day.get("data") else {}
          sleep_score = s_data.get("score")

          sleep_duration_min = None
          rhr_bpm            = None
          sleep_start        = None
          sleep_end          = None
          hrv_ms             = None

          if sleep_raw.get("data"):
              # Pick the longest sleep session (filters out naps)
              main = max(sleep_raw["data"],
                         key=lambda s: s.get("total_sleep_duration", 0))
              raw_dur = main.get("total_sleep_duration")
              if raw_dur:
                  sleep_duration_min = round(raw_dur / 60)
              rhr_bpm     = main.get("lowest_heart_rate")
              sleep_start = main.get("bedtime_start", "")[:16] or None
              sleep_end   = main.get("bedtime_end",   "")[:16] or None
              # HRV lives inside the sleep session object
              hrv_raw = main.get("hrv", {})
              nightly = hrv_raw.get("average_nightly") if isinstance(hrv_raw, dict) else None
              if nightly:
                  hrv_ms = round(nightly, 1)

          print(f"Date:        {TODAY}")
          print(f"Recovery:    {recovery_score}")
          print(f"Sleep score: {sleep_score}")
          print(f"HRV:         {hrv_ms} ms")
          print(f"Sleep:       {sleep_duration_min} min")
          print(f"RHR:         {rhr_bpm} bpm")
          print(f"Bedtime:     {sleep_start} → {sleep_end}")

          # ── Load + update HEALTH_DATABASE.json ───────────────────────────
          with open("HEALTH_DATABASE.json") as f:
              db = json.load(f)

          if "recovery_sleep" not in db:
              db["recovery_sleep"] = []

          idx   = next((i for i, e in enumerate(db["recovery_sleep"])
                        if e.get("date") == TODAY), None)
          entry = db["recovery_sleep"][idx] if idx is not None else {"date": TODAY}

          if recovery_score    is not None: entry["recovery_score_pct"]  = recovery_score
          if sleep_score       is not None: entry["sleep_score_pct"]     = sleep_score
          if hrv_ms            is not None: entry["hrv_ms"]              = hrv_ms
          if sleep_duration_min is not None: entry["sleep_duration_min"] = sleep_duration_min
          if rhr_bpm           is not None: entry["rhr_bpm"]             = rhr_bpm
          if sleep_start:                   entry["sleep_start"]         = sleep_start
          if sleep_end:                     entry["sleep_end"]           = sleep_end
          entry["source"]    = "oura_auto_sync"
          entry["synced_at"] = datetime.now(timezone.utc).isoformat()

          if idx is not None:
              db["recovery_sleep"][idx] = entry
          else:
              db["recovery_sleep"].append(entry)

          db["recovery_sleep"].sort(key=lambda e: e.get("date", ""), reverse=True)

          with open("HEALTH_DATABASE.json", "w") as f:
              json.dump(db, f, indent=2, ensure_ascii=False)

          print("HEALTH_DATABASE.json updated.")
          PYEOF

      - name: Commit updated database
        run: |
          git config user.name  "oura-sync[bot]"
          git config user.email "oura-sync@users.noreply.github.com"
          git add HEALTH_DATABASE.json
          git diff --staged --quiet || git commit -m "Oura auto-sync · $(date -u +%Y-%m-%d\ %H:%M\ UTC)"
          git push
