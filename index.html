<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Todd · BioMetrics</title>
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface2: #1c2230;
  --surface3: #21262d;
  --border: #30363d;
  --accent: #58a6ff;
  --accent-bg: rgba(88,166,255,0.12);
  --green: #3fb950;
  --green-bg: rgba(63,185,80,0.1);
  --yellow: #d29922;
  --yellow-bg: rgba(210,153,34,0.12);
  --red: #f85149;
  --red-bg: rgba(248,81,73,0.1);
  --purple: #a371f7;
  --purple-bg: rgba(163,113,247,0.1);
  --teal: #39d353;
  --text: #e6edf3;
  --text2: #8b949e;
  --text3: #6e7681;
  --chart-hrv: #58a6ff;
  --chart-recovery: #d29922;
  --chart-weight: #3fb950;
  --chart-bf: #f85149;
  --chart-sleep: #a371f7;
  --chart-volume: #39d353;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { font-size: 14px; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  min-height: 100vh;
  max-width: 480px;
  margin: 0 auto;
  padding-bottom: env(safe-area-inset-bottom, 80px);
  padding-bottom: max(80px, calc(env(safe-area-inset-bottom) + 64px));
}

/* ── Topbar ────────────────────────────────────────── */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px 12px;
  border-bottom: 1px solid var(--border);
  background: rgba(13,17,23,0.97);
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(12px);
}
.topbar-name { font-size: 16px; font-weight: 700; letter-spacing: -0.01em; }
.topbar-date { font-size: 11px; color: var(--text3); margin-top: 1px; text-transform: uppercase; letter-spacing: 0.08em; }
.live-pill {
  display: flex; align-items: center; gap: 5px;
  background: var(--green-bg);
  border: 1px solid rgba(63,185,80,0.25);
  border-radius: 20px;
  padding: 4px 10px;
  font-size: 11px; font-weight: 700;
  color: var(--green);
  text-transform: uppercase; letter-spacing: 0.08em;
}
.live-dot {
  width: 6px; height: 6px;
  background: var(--green);
  border-radius: 50%;
  animation: blink 2s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

/* ── Tabs ──────────────────────────────────────────── */
.tabs {
  display: flex;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 57px;
  z-index: 99;
}
.tab-btn {
  flex: 1;
  padding: 10px 0;
  text-align: center;
  font-size: 11px;
  font-weight: 700;
  color: var(--text3);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  transition: color 0.15s;
  user-select: none;
  -webkit-user-select: none;
}
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ── Tab panels ────────────────────────────────────── */
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ── Shared components ─────────────────────────────── */
.section {
  padding: 14px 14px 0;
}
.section-title {
  font-size: 11px; font-weight: 700;
  color: var(--text3);
  text-transform: uppercase; letter-spacing: 0.1em;
  margin-bottom: 10px;
  display: flex; align-items: center; gap: 8px;
}
.section-title::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  margin-bottom: 8px;
}
.card:last-child { margin-bottom: 0; }

/* Status badges */
.badge {
  display: inline-block;
  padding: 2px 7px;
  border-radius: 5px;
  font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.05em;
}
.badge-green  { background: var(--green-bg);  color: var(--green);  }
.badge-yellow { background: var(--yellow-bg); color: var(--yellow); }
.badge-red    { background: var(--red-bg);    color: var(--red);    }
.badge-blue   { background: var(--accent-bg); color: var(--accent); }
.badge-purple { background: var(--purple-bg); color: var(--purple); }
.badge-dim    { background: var(--surface3);  color: var(--text3);  }

/* Data rows with bar */
.data-row {
  display: flex; align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  gap: 8px;
}
.data-row:last-child { border-bottom: none; padding-bottom: 0; }
.dr-key   { width: 100px; flex-shrink: 0; font-size: 12px; color: var(--text2); }
.dr-bar   { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
.dr-bar-fill { height: 100%; border-radius: 2px; transition: width 0.6s ease; }
.dr-val   { min-width: 55px; text-align: right; font-size: 12px; font-weight: 700; flex-shrink: 0; }
.dr-badge { min-width: 60px; text-align: right; flex-shrink: 0; }

/* ── Status grid ───────────────────────────────────── */
.status-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 12px 4px;
}
.status-item { text-align: center; padding: 0 4px; }
.status-item + .status-item { border-left: 1px solid var(--border); }
.si-val { font-size: 22px; font-weight: 700; line-height: 1.1; letter-spacing: -0.02em; }
.si-label { font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 2px; }
.si-badge { margin-top: 3px; }

/* ── Coach note ────────────────────────────────────── */
.coach-note {
  background: var(--surface2);
  border-left: 3px solid var(--accent);
  border-radius: 0 6px 6px 0;
  padding: 14px 14px;
  font-size: 13px;
  color: var(--text2);
  line-height: 1.65;
  margin-bottom: 8px;
}
.coach-note strong { color: var(--text); }
.coach-note p { margin-bottom: 10px; }
.coach-note p:last-child { margin-bottom: 0; }
.coach-label {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.1em; color: var(--accent); margin-bottom: 8px;
  display: flex; align-items: center; gap: 6px;
}
.coach-label::before { content: '◆'; font-size: 7px; }

/* ── Macro progress bars ───────────────────────────── */
.macro-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-top: 2px;
}
.macro-cell {
  background: var(--surface3);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px;
}
.macro-cell.full { grid-column: 1 / -1; }
.macro-label { font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 5px; }
.macro-nums { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 5px; }
.macro-val { font-size: 20px; font-weight: 800; letter-spacing: -0.02em; line-height: 1; }
.macro-target { font-size: 11px; color: var(--text3); }
.macro-track { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
.macro-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }
.macro-delta { font-size: 10px; margin-top: 4px; }

/* ── Weekly summary ────────────────────────────────── */
.week-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
  margin-top: 6px;
}
.week-cell {
  background: var(--surface3);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px 8px;
  text-align: center;
}
.week-val { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; line-height: 1; }
.week-lbl { font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 3px; }
.week-sub { font-size: 10px; color: var(--text2); margin-top: 2px; }

/* ── Sparkline chart ───────────────────────────────── */
.chart-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  margin-bottom: 8px;
}
.chart-card:last-child { margin-bottom: 0; }
.chart-header {
  display: flex; justify-content: space-between; align-items: flex-start;
  margin-bottom: 10px;
}
.chart-title { font-size: 11px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.08em; }
.chart-sub   { font-size: 10px; color: var(--text3); margin-top: 2px; }
.chart-val   { font-size: 20px; font-weight: 700; line-height: 1; text-align: right; }
.chart-change{ font-size: 11px; margin-top: 2px; text-align: right; }
.chart-area  { width: 100%; }
.chart-x-labels {
  display: flex; justify-content: space-between;
  margin-top: 4px;
  font-size: 9px; color: var(--text3);
  overflow: hidden;
}
.chart-x-labels span { flex: 1; text-align: center; overflow: hidden; white-space: nowrap; }
.chart-x-labels span:first-child { text-align: left; }
.chart-x-labels span:last-child { text-align: right; }

/* ── Glucose zone ──────────────────────────────────── */
.glucose-zone-bar {
  height: 8px; border-radius: 4px;
  background: linear-gradient(90deg, var(--green) 0%, var(--green) 64%, var(--yellow) 64%, var(--yellow) 82%, var(--red) 82%);
  position: relative;
  margin: 8px 0 4px;
}
.glucose-marker {
  position: absolute;
  top: -4px;
  width: 4px; height: 16px;
  background: var(--text);
  border-radius: 2px;
  transform: translateX(-50%);
  box-shadow: 0 0 6px rgba(230,237,243,0.5);
}
.zone-labels { display: flex; justify-content: space-between; font-size: 10px; color: var(--text3); }

/* ── Progress bar ──────────────────────────────────── */
.progress-wrap { margin: 8px 0; }
.progress-header { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 5px; }
.progress-key { color: var(--text2); }
.progress-vals { font-weight: 700; }
.progress-track { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
.progress-fill  { height: 100%; border-radius: 3px; transition: width 0.6s ease; }

/* ── Goal ring area ────────────────────────────────── */
.goal-card-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 14px;
}
.goal-big { font-size: 40px; font-weight: 800; letter-spacing: -0.03em; line-height: 1; }
.goal-big-unit { font-size: 16px; font-weight: 400; color: var(--text2); }
.goal-right { text-align: right; }
.goal-lbl { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; }
.goal-target { font-size: 16px; font-weight: 700; color: var(--green); }
.goal-remaining { font-size: 11px; color: var(--teal); margin-top: 2px; }

/* ── Segmental grid ────────────────────────────────── */
.seg-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.seg-card { background: var(--surface3); border: 1px solid var(--border); border-radius: 6px; padding: 10px; }
.seg-card.full-width { grid-column: 1/-1; }
.seg-title { font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
.seg-row-item {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 11px; padding: 3px 0;
  border-bottom: 1px solid var(--border);
}
.seg-row-item:last-child { border-bottom: none; padding-bottom: 0; }
.seg-row-key { color: var(--text2); }
.seg-row-right { display: flex; align-items: center; gap: 6px; }

/* ── Session history list ──────────────────────────── */
.session-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.session-item:last-child { border-bottom: none; padding-bottom: 0; }
.session-date {
  font-size: 10px; color: var(--text3); text-transform: uppercase;
  letter-spacing: 0.06em; min-width: 44px;
}
.session-info { flex: 1; min-width: 0; }
.session-name { font-size: 12px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.session-meta { font-size: 11px; color: var(--text3); margin-top: 1px; }
.session-vol { font-size: 12px; font-weight: 700; color: var(--teal); text-align: right; min-width: 52px; }

/* ── Stat row grid ─────────────────────────────────── */
.stat-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
  margin: 10px 0;
}
.stat-cell {
  background: var(--surface3);
  border-radius: 6px;
  padding: 10px 8px;
  text-align: center;
}
.stat-cell-val { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }
.stat-cell-lbl { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }

/* ── Trends full chart ─────────────────────────────── */
.trend-chart-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px;
  margin-bottom: 10px;
}
.trend-chart-card:last-child { margin-bottom: 0; }
.trend-header {
  display: flex; justify-content: space-between; align-items: flex-start;
  margin-bottom: 12px;
}
.trend-title-block .t-title { font-size: 13px; font-weight: 700; }
.trend-title-block .t-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }
.trend-stat-block { text-align: right; }
.trend-stat-block .t-cur { font-size: 22px; font-weight: 700; line-height: 1; }
.trend-stat-block .t-change { font-size: 11px; margin-top: 2px; }

/* ── Loading ───────────────────────────────────────── */
.loading {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 200px; gap: 12px;
  color: var(--text3);
  font-size: 13px;
}
.spinner {
  width: 28px; height: 28px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Error ─────────────────────────────────────────── */
.error-block {
  margin: 20px 16px;
  background: var(--red-bg);
  border: 1px solid rgba(248,81,73,0.3);
  border-radius: 8px;
  padding: 16px;
  font-size: 13px;
  color: var(--red);
  line-height: 1.5;
}
.error-block code { font-family: monospace; font-size: 11px; }

/* ── Bottom nav ────────────────────────────────────── */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 480px;
  background: rgba(13,17,23,0.97);
  border-top: 1px solid var(--border);
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  backdrop-filter: blur(12px);
  padding-bottom: env(safe-area-inset-bottom, 0);
}
.bn-item {
  padding: 10px 0 12px;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  cursor: pointer;
  user-select: none;
}
.bn-icon { font-size: 18px; }
.bn-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); font-weight: 700; }
.bn-item.active .bn-label { color: var(--accent); }

.spacer { height: 14px; }
</style>
</head>
<body>

<!-- Topbar -->
<div class="topbar">
  <div>
    <div class="topbar-name">Todd Blackhurst</div>
    <div class="topbar-date" id="topbar-date">Loading…</div>
  </div>
  <div class="live-pill">
    <div class="live-dot"></div>
    Live
  </div>
</div>

<!-- Tabs -->
<div class="tabs">
  <div class="tab-btn active" data-tab="today">Today</div>
  <div class="tab-btn" data-tab="body">Body</div>
  <div class="tab-btn" data-tab="training">Train</div>
  <div class="tab-btn" data-tab="trends">Trends</div>
  <div class="tab-btn" data-tab="coach">Coach</div>
</div>

<!-- Tab panels -->
<div id="tab-today"    class="tab-panel active"><div class="loading"><div class="spinner"></div>Loading…</div></div>
<div id="tab-body"     class="tab-panel"><div class="loading"><div class="spinner"></div>Loading…</div></div>
<div id="tab-training" class="tab-panel"><div class="loading"><div class="spinner"></div>Loading…</div></div>
<div id="tab-trends"   class="tab-panel"><div class="loading"><div class="spinner"></div>Loading…</div></div>
<div id="tab-coach"    class="tab-panel"><div class="loading"><div class="spinner"></div>Loading…</div></div>

<!-- Bottom nav (mirrors tabs) -->
<div class="bottom-nav" id="bottom-nav">
  <div class="bn-item active" data-tab="today"><div class="bn-icon">📡</div><div class="bn-label">Today</div></div>
  <div class="bn-item" data-tab="body"><div class="bn-icon">🫀</div><div class="bn-label">Body</div></div>
  <div class="bn-item" data-tab="training"><div class="bn-icon">💪</div><div class="bn-label">Train</div></div>
  <div class="bn-item" data-tab="trends"><div class="bn-icon">📈</div><div class="bn-label">Trends</div></div>
  <div class="bn-item" data-tab="coach"><div class="bn-icon">🎯</div><div class="bn-label">Coach</div></div>
</div>

<script>
/* ══════════════════════════════════════════════════════
   UTILITIES
══════════════════════════════════════════════════════ */

const DB_URL = './HEALTH_DATABASE.json';
let DB = null;
const rendered = {};

function fmt(val, dec = 1) {
  if (val === null || val === undefined) return '—';
  return typeof val === 'number' ? val.toFixed(dec) : val;
}
function fmtDate(d) {
  if (!d) return '';
  const parts = d.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[parseInt(parts[1])-1]} ${parseInt(parts[2])}`;
}
function fmtDateShort(d) {
  if (!d) return '';
  const parts = d.split('-');
  return `${parts[1]}/${parts[2]}`;
}
function latest(arr) {
  return arr.slice().sort((a,b) => a.date > b.date ? -1 : 1)[0] || {};
}
function sortAsc(arr) {
  return arr.slice().sort((a,b) => a.date < b.date ? -1 : 1);
}
function badge(text, color) {
  return `<span class="badge badge-${color}">${text}</span>`;
}
function recoveryBadge(score) {
  if (score === null || score === undefined) return badge('—', 'dim');
  if (score >= 70) return badge('Optimal', 'green');
  if (score >= 40) return badge('Normal', 'yellow');
  return badge('Low', 'red');
}
function hrvBadge(hrv, baseline) {
  if (!hrv) return badge('—', 'dim');
  const diff = hrv - baseline;
  if (diff > 3)  return badge(`+${diff.toFixed(1)} above base`, 'green');
  if (diff < -3) return badge(`${diff.toFixed(1)} below base`, 'red');
  return badge('At baseline', 'blue');
}
function sleepBadge(score) {
  if (!score) return badge('—', 'dim');
  if (score >= 80) return badge('Great', 'green');
  if (score >= 60) return badge('Fair', 'yellow');
  return badge('Poor', 'red');
}
function weightChange(current, prev) {
  if (!current || !prev) return '';
  const diff = current - prev;
  if (Math.abs(diff) < 0.1) return badge('Stable', 'blue');
  return diff < 0 ? badge(`−${Math.abs(diff).toFixed(1)} lbs`, 'green') : badge(`+${diff.toFixed(1)} lbs`, 'red');
}

/* ══════════════════════════════════════════════════════
   SVG LINE CHART
   data: [{date, value}, …]  (nulls skipped)
══════════════════════════════════════════════════════ */
function buildLineChart(data, opts = {}) {
  const {
    color = '#58a6ff',
    height = 56,
    baseline = null,
    baselineLabel = null,
  } = opts;

  const valid = data.filter(d => d.value !== null && d.value !== undefined);
  if (valid.length < 2) return { svg: '<div style="color:var(--text3);font-size:11px;padding:8px 0">Not enough data yet</div>', labels: [] };

  const W = 300, H = height, px = 4, py = 6;
  const ys = valid.map(d => d.value);
  const allYs = baseline !== null ? [...ys, baseline] : ys;
  const yMin = Math.min(...allYs) - (Math.max(...allYs) - Math.min(...allYs)) * 0.15;
  const yMax = Math.max(...allYs) + (Math.max(...allYs) - Math.min(...allYs)) * 0.15;
  const yRange = yMax - yMin || 1;

  const toX = i => px + (i / (valid.length - 1)) * (W - 2 * px);
  const toY = v => H - py - ((v - yMin) / yRange) * (H - 2 * py);

  const pts = valid.map((d, i) => ({ x: toX(i), y: toY(d.value), d }));
  const id = 'g' + Math.random().toString(36).slice(2, 7);

  let s = `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="width:100%;height:${H}px;display:block;overflow:visible">
  <defs>
    <linearGradient id="${id}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${color}" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
    </linearGradient>
  </defs>`;

  // Baseline line
  if (baseline !== null) {
    const by = toY(baseline);
    s += `<line x1="${px}" y1="${by.toFixed(1)}" x2="${W-px}" y2="${by.toFixed(1)}" stroke="rgba(110,118,129,0.5)" stroke-width="1" stroke-dasharray="5 3"/>`;
    if (baselineLabel) {
      s += `<text x="${W-px}" y="${(by - 3).toFixed(1)}" fill="rgba(110,118,129,0.7)" font-size="8" text-anchor="end" font-family="-apple-system,sans-serif">${baselineLabel}</text>`;
    }
  }

  // Area fill
  const linePts = pts.map((p,i) => `${i===0?'M':'L'}${p.x.toFixed(1)} ${p.y.toFixed(1)}`).join(' ');
  const areaPts = linePts + ` L${pts[pts.length-1].x.toFixed(1)} ${H} L${pts[0].x.toFixed(1)} ${H} Z`;
  s += `<path d="${areaPts}" fill="url(#${id})" stroke="none"/>`;

  // Line
  s += `<path d="${linePts}" fill="none" stroke="${color}" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>`;

  // Last dot only
  const last = pts[pts.length - 1];
  s += `<circle cx="${last.x.toFixed(1)}" cy="${last.y.toFixed(1)}" r="3.5" fill="${color}" stroke="#0d1117" stroke-width="1.5"/>`;

  s += '</svg>';

  // X labels (first, middle, last)
  const labelIdxs = valid.length <= 4
    ? valid.map((_, i) => i)
    : [0, Math.floor(valid.length / 2), valid.length - 1];
  const labels = [...new Set(labelIdxs)].map(i => fmtDate(valid[i].date));

  return { svg: s, labels };
}

/* Bar chart for volume */
function buildBarChart(data, opts = {}) {
  const { color = '#39d353', height = 60 } = opts;
  const valid = data.filter(d => d.value !== null && d.value !== undefined);
  if (valid.length < 1) return '<div style="color:var(--text3);font-size:11px;padding:8px 0">No data</div>';

  const W = 300, H = height;
  const max = Math.max(...valid.map(d => d.value));
  const barW = (W / valid.length) * 0.65;
  const gap   = (W / valid.length) * 0.35;

  let s = `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="width:100%;height:${H}px;display:block">`;
  valid.forEach((d, i) => {
    const x = i * (barW + gap) + gap / 2;
    const barH = (d.value / max) * (H - 8);
    const y = H - barH;
    const isLast = i === valid.length - 1;
    s += `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${barW.toFixed(1)}" height="${barH.toFixed(1)}"
           rx="2" fill="${isLast ? color : 'rgba(57,211,83,0.4)'}"/>`;
  });
  s += '</svg>';
  return s;
}

/* ══════════════════════════════════════════════════════
   COACHING INSIGHT GENERATOR
══════════════════════════════════════════════════════ */
function coachingNote(db) {
  const sleep   = latest(db.recovery_sleep);
  const profile = db.profile;
  const baseline = profile.oura_biology_baselines || {};
  const hrvBase  = baseline.hrv_baseline_ms || 32.5;
  const body     = latest(db.body_composition);
  const nutrition = db.nutrition || [];
  const todayNut  = nutrition.length ? latest(nutrition) : null;

  const hrv       = sleep.hrv_ms;
  const recovery  = sleep.recovery_score_pct;
  const debtMin   = sleep.sleep_bank_min || sleep.autosleep_sleep_bank_min;
  const diff      = hrv ? +(hrv - hrvBase).toFixed(1) : null;
  const weightLbs = body.weight_lbs || (body.weight_kg ? +(body.weight_kg * 2.2046).toFixed(1) : null);
  const goalLbs   = (profile.nutrition_targets && profile.nutrition_targets.goal_weight_lbs) || 165;

  // ── Paragraph 1: Recovery & Readiness ──
  let para1 = '';
  if (hrv && diff !== null) {
    if (diff > 3) {
      para1 = `Todd, your HRV is at <strong>${hrv} ms</strong> — that's ${diff} ms above your baseline of ${hrvBase} ms. Your nervous system is recovered and ready to work. If you've got a strength session planned today, push it. This is exactly the signal you want to see.${recovery >= 70 ? " Readiness is high across the board — don't leave that on the table." : ""}`;
    } else if (diff < -3) {
      para1 = `Todd, your HRV is down to <strong>${hrv} ms</strong> — ${Math.abs(diff)} ms below your ${hrvBase} ms baseline. I'm not going to sugarcoat it: your body is telling you it's under-recovered. You can still train, but this isn't the day to chase PRs. Keep everything under 122 bpm, cut volume if needed, and protect the sleep tonight.${debtMin && debtMin < -90 ? ` You're carrying a sleep debt of ${Math.floor(Math.abs(debtMin)/60)}h ${Math.abs(debtMin)%60}m — that's compounding the problem. Lights out by 9:30 tonight is non-negotiable.` : ''}`;
    } else {
      para1 = `Todd, HRV is at <strong>${hrv} ms</strong> — right at your ${hrvBase} ms baseline. Solid, normal day. ${recovery >= 70 ? "Readiness is green, which means you've got the capacity to push if the session calls for it." : recovery < 40 ? "Readiness is on the low side though, so take the intensity cues seriously today." : "Train with intent, keep your HR managed, and focus on quality movement over maximum load."}${debtMin && debtMin < -60 ? ` That sleep debt is still there — ${Math.floor(Math.abs(debtMin)/60)}h ${Math.abs(debtMin)%60}m in the hole. Address it before it starts dragging your performance.` : ''}`;
    }
  } else {
    para1 = `Todd, get your Oura data synced — I need your HRV to give you an accurate training decision today. Until then, default to a controlled session: HR under 122 bpm, focus on structural work and quality movement.`;
  }

  // ── Paragraph 2: Nutrition ──
  let para2 = '';
  if (todayNut && todayNut.daily_totals && todayNut.daily_totals.calories_kcal) {
    const cals = todayNut.daily_totals.calories_kcal;
    const prot = todayNut.daily_totals.protein_g;
    const targetCals = 2000;
    const targetProt = 150;
    const calPct = Math.round((cals / targetCals) * 100);
    if (cals < targetCals * 0.5) {
      para2 = `The nutrition data has you at <strong>${cals} kcal</strong> — that's under 50% of your 2,000 kcal target. I need you to be real with yourself here: that level of undereating either means the logging is incomplete, or you're genuinely not fueling the training you're doing. At 57, anabolic resistance is real — chronically undereating while training accelerates muscle loss. Hit your <strong>150g protein</strong> first, every single day, no exceptions.`;
    } else if (cals >= targetCals * 0.9 && prot && prot >= targetProt * 0.9) {
      para2 = `Nutrition is looking good — <strong>${cals} kcal</strong> logged with ${prot}g protein. That's exactly what the plan calls for. A calculated deficit with high protein is the only sustainable way to cut fat without burning through the muscle you're building in the gym. Keep it up.`;
    } else if (prot && prot < targetProt * 0.7) {
      para2 = `Calories are logged at <strong>${cals} kcal</strong>, but protein is showing ${prot}g — well short of your 150g target. This matters more than the calorie number. Protein is what keeps you from cannibalizing muscle while in a deficit. Prioritize it at every meal, not as an afterthought.`;
    } else {
      para2 = `Nutrition logged at <strong>${cals} kcal</strong> — ${calPct < 80 ? "you're a bit short of target" : "on track"}. Stay dialed in on protein. Your 2,000 kcal / 150g protein target exists for a specific reason at your age and training intensity. The deficit is already built in — don't accidentally make it bigger by skipping meals.`;
    }
  } else {
    para2 = `Get today's nutrition logged. I know tracking feels like admin work, but the data is what lets me give you real coaching. Your target is <strong>2,000 kcal and 150g protein</strong> — a ~380 kcal deficit from your TDEE with protein elevated to protect your muscle mass. That's the plan. Execute it.`;
  }

  // ── Paragraph 3: Progress & Accountability ──
  let para3 = '';
  if (weightLbs) {
    const remaining = +(weightLbs - goalLbs).toFixed(1);
    if (remaining > 7) {
      para3 = `You're at <strong>${weightLbs.toFixed(1)} lbs</strong> with ${remaining} lbs to your goal of ${goalLbs} lbs. You're moving in the right direction — keep stacking consistent days. The mission is clear: reduce visceral fat, preserve muscle, improve sleep, and correct the structural imbalances we've identified. Every session and every meal is a vote for or against that goal. Make most of them count.`;
    } else if (remaining > 2) {
      para3 = `You're <strong>${remaining} lbs from your goal</strong> of ${goalLbs} lbs — you're in the final push. This is where most people ease off because the end feels close. Don't. The structural work matters just as much now as when you started — your right-side dominance and shoulder imbalance don't fix themselves with weight loss. Keep the corrective work in every session.`;
    } else if (remaining > 0) {
      para3 = `You're <strong>nearly at goal weight</strong> — ${remaining} lbs to ${goalLbs} lbs. Finish the job. Don't drift into maintenance mode just because the scale is cooperating. The structural correction and performance work are the long game here.`;
    } else {
      para3 = `Weight goal hit. Now the work shifts — maintain lean mass, keep reducing visceral fat, and address the structural imbalances that affect how your body actually moves and ages. The scale isn't the whole picture anymore.`;
    }
  } else {
    para3 = `Keep stacking good days. Sleep → nutrition → training — in that order of priority. The right-side dominance and shoulder asymmetry are long-game problems that require consistent, patient work. Don't skip the corrective elements. They're not optional.`;
  }

  return `<div class="coach-label">Coach · Daily Brief</div><p>${para1}</p><p>${para2}</p><p>${para3}</p>`;
}

function renderToday(db) {
  const sleep   = latest(db.recovery_sleep);

  const recovery  = sleep.recovery_score_pct;
  const hrv       = sleep.hrv_ms;
  const rhr       = sleep.resting_hr_bpm;
  const glu       = glucose.current_reading_mgdl;

  function recColor(r) {
    if (!r) return 'var(--text)';
    if (r >= 70) return 'var(--green)';
    if (r >= 40) return 'var(--yellow)';
    return 'var(--red)';
  }
  function hrvColor(h) {
    if (!h) return 'var(--text)';
    const d = h - (baseline.hrv_baseline_ms || 32.5);
    if (d > 3) return 'var(--green)';
    if (d < -3) return 'var(--red)';
    return 'var(--accent)';
  }

  // HRV sparkline data
  const hrvData = sortAsc(db.recovery_sleep)
    .filter(r => r.hrv_ms)
    .map(r => ({ date: r.date, value: r.hrv_ms }));

  const recData = sortAsc(db.recovery_sleep)
    .filter(r => r.recovery_score_pct)
    .map(r => ({ date: r.date, value: r.recovery_score_pct }));

  const hrvChart = buildLineChart(hrvData, { color: 'var(--chart-hrv)', baseline: baseline.hrv_baseline_ms || 32.5, baselineLabel: `Baseline ${baseline.hrv_baseline_ms || 32.5}` });
  const recChart = buildLineChart(recData, { color: 'var(--chart-recovery)', height: 50 });

  // Glucose zone marker (70-180 range, in-range = 70-140)
  const gluPct = glu ? Math.min(100, Math.max(0, ((glu - 70) / 110) * 100)) : 28;

  // Sleep data
  const totalMin = sleep.total_sleep_min || sleep.autosleep_total_sleep_min;
  const totalH   = totalMin ? Math.floor(totalMin / 60) : '—';
  const totalM   = totalMin ? totalMin % 60 : '';
  const totalStr = totalMin ? `${totalH}h ${totalM}m` : '—';
  const deepMin  = sleep.deep_sleep_min || sleep.autosleep_deep_min;
  const remMin   = sleep.rem_sleep_min  || sleep.autosleep_rem_min;
  const deepStr  = deepMin ? `${deepMin}m` : '—';
  const remStr   = remMin  ? (remMin >= 60 ? `${Math.floor(remMin/60)}h ${remMin%60}m` : `${remMin}m`) : '—';
  const debtMin  = sleep.sleep_bank_min || sleep.autosleep_sleep_bank_min;
  const debtStr  = debtMin ? `−${Math.floor(Math.abs(debtMin)/60)}h ${Math.abs(debtMin)%60}m` : '—';

  // Sleep bar pct helpers
  const sleepPct  = totalMin ? Math.min(100, (totalMin / 480) * 100) : 0;   // vs 8h
  const deepPct   = deepMin  ? Math.min(100, (deepMin / 90) * 100)   : 0;   // vs 90m ideal
  const remPct    = remMin   ? Math.min(100, (remMin / 120) * 100)   : 0;   // vs 120m ideal
  const effPct    = sleep.sleep_efficiency_pct || 0;

  const weightLbs = body.weight_lbs || (body.weight_kg ? body.weight_kg * 2.2046 : null);
  const goalLbs   = profile.nutrition_targets ? profile.nutrition_targets.goal_weight_lbs : 165;
  const startLbs  = 172.7; // from first body comp entry
  const progressPct = weightLbs ? Math.min(100, ((startLbs - weightLbs) / (startLbs - goalLbs)) * 100) : 0;

  // ── Nutrition today ──
  const nutEntries = db.nutrition || [];
  const todayNut   = nutEntries.length ? latest(nutEntries) : null;
  const nutTotals  = todayNut ? (todayNut.daily_totals || {}) : {};

  const logged_cal   = nutTotals.calories_kcal || 0;

  const logged_fat   = nutTotals.fat_g          || 0;

function renderTraining(db) {
  const strengthLogs = sortAsc(db.strength_logs);

    ...strengthLogs.map(s => ({...s, _type: 'strength'})),

  ].sort((a,b) => a.date < b.date ? 1 : -1);

  const latest_s = strengthLogs[strengthLogs.length - 1] || {};

  // Volume chart (last 12 strength sessions)
  const recent12 = strengthLogs.slice(-12);
  const volData = recent12.map(s => ({ date: s.date, value: s.volume_kg ? Math.round(s.volume_kg * 2.2046) : null }));
  const volChart = buildLineChart(volData, { color: 'var(--chart-volume)', height: 60 });

  // Session history list
  const sessionListHtml = strengthLogs.slice().reverse().slice(0, 15).map(s => {
    const volLbs = s.volume_kg ? Math.round(s.volume_kg * 2.2046).toLocaleString() : '—';
    return `<div class="session-item">
      <div class="session-date">${fmtDateShort(s.date)}</div>
      <div class="session-info">
        <div class="session-name">${s.session_focus || 'Strength'}</div>
        <div class="session-meta">${s.duration_min}min · ${s.exercise_count} exercises · ${s.location || 'WorldGym'}</div>

      <div class="session-vol">${volLbs}<div style="font-size:9px;color:var(--text3)">lbs vol</div></div>

  // Latest session exercises
  const exHtml = (latest_s.exercises || []).slice(0, 8).map(ex => {
    const workSets = (ex.sets || []).filter(s => !s.warmup);
    const setsHtml = workSets.slice(0, 6).map(s =>

        <div class="set-n">Set ${s.n}</div>

      <div class="ex-header">
        <div class="ex-name">${ex.name}</div>
        <div>${badge(workSets.length + ' sets','dim')}</div>
      </div>

  }).join('');

  const latestVolLbs = latest_s.volume_kg ? Math.round(latest_s.volume_kg * 2.2046).toLocaleString() : '—';

  return `
  <!-- Latest session -->
  <div class="section">
    <div class="section-title">Latest Session · ${fmtDate(latest_s.date)}</div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">

          <div class="stat-cell-lbl">lbs Volume</div>
        </div>
        <div class="stat-cell">
          <div class="stat-cell-val" style="font-size:16px">${latest_s.duration_min}m</div>
          <div class="stat-cell-lbl">Duration</div>

        <div class="stat-cell">

          <div class="stat-cell-lbl">Exercises</div>

      </div>
      ${latest_s.calories_kcal ? `<div style="font-size:12px;color:var(--text2)">${latest_s.calories_kcal} kcal · ${badge('HR ok','green')}</div>` : ''}

          <div class="chart-sub">Last ${recent12.length} strength sessions</div>
        </div>
        <div>
          <div class="chart-val" style="color:var(--chart-volume)">${latestVolLbs}</div>
          <div class="chart-change" style="color:var(--text3)">lbs latest</div>
        </div>

      <div class="chart-area">${volChart.svg}</div>

/* ══════════════════════════════════════════════════════
   COACHING TEASER (Today tab — 1 paragraph only)
══════════════════════════════════════════════════════ */
function coachingTeaser(db) {
  const cb = db.coaching_brief;
  // If we have a stored brief from the scheduled task, show the recovery paragraph
  if (cb && cb.sections && cb.sections.recovery) {
    const updatedAt = cb.generated_at ? new Date(cb.generated_at) : null;
    const timeStr = updatedAt ? updatedAt.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit', hour12:true}) : '';
    return `<div class="coach-label" style="margin-bottom:6px">Coach · ${timeStr ? 'Updated ' + timeStr : 'Daily Brief'}</div><p>${cb.sections.recovery}</p>`;
  }
  // Fallback: generate the readiness paragraph
  const sleep    = latest(db.recovery_sleep);
  const baseline = db.profile.oura_biology_baselines || {};
  const hrv      = sleep.hrv_ms;
  const recovery = sleep.recovery_score_pct;
  const hrvBase  = baseline.hrv_baseline_ms || 32.5;
  const diff     = hrv ? +(hrv - hrvBase).toFixed(1) : null;

  let para = '';
  if (hrv && diff !== null) {
    if (diff > 3) {
      para = `HRV at <strong>${hrv} ms</strong> — ${diff} ms above your ${hrvBase} ms baseline. Nervous system is recovered and ready. If you've got a strength session planned, push it.`;
    } else if (diff < -3) {
      para = `HRV down to <strong>${hrv} ms</strong> — ${Math.abs(diff)} ms below your ${hrvBase} ms baseline. Under-recovered today. Keep effort controlled, HR under 122 bpm. Don't chase PRs.`;
    } else {
      para = `HRV at <strong>${hrv} ms</strong> — right at baseline. Solid training day. ${recovery >= 70 ? 'Readiness is green — you have capacity to push.' : recovery < 40 ? 'Readiness is low, keep intensity managed.' : 'Train with intent, prioritize quality movement.'}`;
    }
  } else {
    para = `Sync your Oura data for a readiness decision. Until then, default to a controlled session: HR under 122 bpm, structural work and quality movement.`;
  }
  return `<div class="coach-label">Coach · Daily Brief</div><p>${para}</p>`;
}

/* ══════════════════════════════════════════════════════
   COACH TAB — FULL RENDERING
══════════════════════════════════════════════════════ */
function renderCoach(db) {
  const cb       = db.coaching_brief;
  const sleep    = latest(db.recovery_sleep);
  const body     = latest(db.body_composition);
  const baseline = db.profile.oura_biology_baselines || {};
  const hrv      = sleep.hrv_ms;
  const recovery = sleep.recovery_score_pct;
  const hrvBase  = baseline.hrv_baseline_ms || 32.5;
  const diff     = hrv ? +(hrv - hrvBase).toFixed(1) : null;
  const weightLbs = body.weight_lbs || (body.weight_kg ? +(body.weight_kg * 2.2046).toFixed(1) : null);
  const goalLbs   = (db.profile.nutrition_targets && db.profile.nutrition_targets.goal_weight_lbs) || 165;
  const nutrition = db.nutrition || [];
  const todayNut  = nutrition.length ? latest(nutrition) : null;

  // Section renderer helper
  function coachSection(title, colorVar, text) {
    return `
    <div style="margin-bottom:16px">
      <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:${colorVar};margin-bottom:8px;display:flex;align-items:center;gap:5px">
        <span style="font-size:7px">◆</span> ${title}
      </div>
      <div style="font-size:13px;color:var(--text2);line-height:1.7;background:var(--surface);border:1px solid var(--border);border-left:3px solid ${colorVar};border-radius:0 6px 6px 0;padding:12px 14px">${text}</div>
    </div>`;
  }

  let sections = '';

  if (cb && cb.sections) {
    // ── Render stored brief from scheduled task ──
    const updatedAt = cb.generated_at ? new Date(cb.generated_at) : null;
    const timeStr   = updatedAt ? updatedAt.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit', hour12:true}) : '';
    const dateStr   = updatedAt ? updatedAt.toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'}) : '';

    const sectionDefs = [
      { key: 'recovery',          title: 'Recovery & Readiness',     color: 'var(--accent)'  },
      { key: 'training_direction',title: 'Training Direction',       color: 'var(--green)'   },
      { key: 'workout_prep',      title: 'Workout Preparation',      color: 'var(--teal)'    },
      { key: 'nutrition',         title: 'Nutrition',                color: 'var(--yellow)'  },
      { key: 'progress',          title: 'Progress & Accountability',color: 'var(--purple)'  },
      { key: 'watch_for',         title: 'What to Watch',            color: 'var(--text2)'   },
    ];

    sectionDefs.filter(s => cb.sections[s.key]).forEach(s => {
      sections += coachSection(s.title, s.color, cb.sections[s.key]);
    });

    return `
    <div style="padding:14px 14px 0">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)">
        <div>
          <div style="font-size:16px;font-weight:700;letter-spacing:-0.01em">Daily Coaching Brief</div>
          <div style="font-size:11px;color:var(--text3);margin-top:3px">AI Coach · Updates hourly 6am–9pm</div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          ${updatedAt ? `<div style="font-size:11px;color:var(--text3)">${dateStr}</div><div style="font-size:13px;font-weight:700;color:var(--accent)">${timeStr}</div>` : '<span class="badge badge-yellow">No brief yet</span>'}
        </div>
      </div>
      ${sections}
    </div>
    <div class="spacer"></div>`;

  } else {
    // ── Fallback: generate client-side coaching ──

    // Section 1: Recovery
    let recText = '';
    if (hrv && diff !== null) {
      const debtMin = sleep.sleep_bank_min || sleep.autosleep_sleep_bank_min;
      if (diff > 3) {
        recText = `Your HRV is at <strong>${hrv} ms</strong> — ${diff} ms above your ${hrvBase} ms baseline. Your nervous system is recovered and ready to work. If you have a strength session planned, push it. This is exactly the signal you want to see.${recovery >= 70 ? " Readiness is high across the board — don't leave that on the table." : ""}`;
      } else if (diff < -3) {
        recText = `HRV is down to <strong>${hrv} ms</strong> — ${Math.abs(diff)} ms below your ${hrvBase} ms baseline. Your body is telling you it's under-recovered. You can still train, but today is not the day to chase PRs. Keep everything under 122 bpm, cut volume if needed, and protect the sleep tonight.${debtMin && debtMin < -90 ? ` You're carrying a sleep debt of ${Math.floor(Math.abs(debtMin)/60)}h ${Math.abs(debtMin)%60}m — that's compounding the problem.` : ''}`;
      } else {
        recText = `HRV is at <strong>${hrv} ms</strong> — right at your ${hrvBase} ms baseline. Solid, normal day. ${recovery >= 70 ? "Readiness is green, which means you have the capacity to push if the session calls for it." : recovery < 40 ? "Readiness is on the low side though — take the intensity cues seriously today." : "Train with intent, keep your HR managed, and focus on quality movement over maximum load."}`;
      }
    } else {
      recText = `Sync your Oura data to get an accurate training decision. Until then, default to a controlled session: HR under 122 bpm, focus on structural work and quality movement.`;
    }
    sections += coachSection('Recovery & Readiness', 'var(--accent)', recText);

    // Section 2: Training direction
    let trainText = '';
    if (hrv) {
      if (diff > 3) {
        trainText = `Today is a green-light day — nervous system is fully loaded. This is the session to push your primary lift, take sets close to failure on the main movements, and actually chase a PR if the opportunity is there. Don't waste a high-HRV day on a recovery session.`;
      } else if (diff < -3) {
        trainText = `With HRV suppressed, today's training priority shifts to quality over quantity. Do your corrective work properly. Reduce main lift volume by 20–30%, avoid grinding through failed reps, and keep rest periods generous. A controlled session that doesn't create excess fatigue is a win today.`;
      } else {
        trainText = `Normal training day. Execute the planned session at full intent — just don't go hunting for max effort. Your primary movements should feel challenging but not desperate. Quality reps, proper rest, and consistent structural correction work.`;
      }
    } else {
      trainText = `Without readiness data, train at 75% of planned intensity and see how the session feels at the warm-up. Your body will tell you more in the first 15 minutes than any number on a screen.`;
    }
    sections += coachSection('Training Direction', 'var(--green)', trainText);

    // Section 3: Workout prep
    sections += coachSection('Workout Preparation', 'var(--teal)',
      `Before every session: spend 8–10 minutes on Floor 3 for prep and activation. <strong>Hip 90/90 mobility</strong> (avoid deep flexion — mild OA), <strong>banded hip abduction</strong> to wake up the left glute, and <strong>thoracic rotation</strong> to offset the stiffness. Your right-side dominance means you need to consciously prime the left side before loading. Don't skip the activation work — it directly affects how well your corrective movements function in the main session.`
    );

    // Section 4: Nutrition
    let nutText = '';
    if (todayNut && todayNut.daily_totals && todayNut.daily_totals.calories_kcal) {
      const cals = todayNut.daily_totals.calories_kcal;
      const prot = todayNut.daily_totals.protein_g || 0;
      const calPct = Math.round((cals / 2000) * 100);
      if (prot < 105) {
        nutText = `Calories are logged at <strong>${cals} kcal</strong> (${calPct}% of target), but protein is at ${prot}g — well short of your 150g target. This matters more than the calorie number. Protein is what keeps you from losing muscle in a deficit. At 57, anabolic resistance is real — you need more protein than a younger athlete to get the same muscle-preserving effect. Prioritize a protein source at every meal and hit 150g before worrying about anything else.`;
      } else if (cals < 1400) {
        nutText = `Your logged intake is <strong>${cals} kcal</strong> — that's significantly under your 2,000 kcal target. Either the log is incomplete, or you're genuinely undereating. A 380 kcal deficit is already built into your plan — going lower accelerates muscle loss and increases cortisol, both of which undermine your goals. Log everything and hit the target.`;
      } else {
        nutText = `Nutrition is on track — <strong>${cals} kcal</strong> with ${prot}g protein logged. That's the plan: a deliberate ~380 kcal deficit with elevated protein to preserve muscle during the cut. Keep this consistency going. The compounding effect of hitting targets daily is what drives the body composition change you're after.`;
      }
    } else {
      nutText = `No nutrition data logged yet today. Your targets are <strong>2,000 kcal / 150g protein / 190g carbs / 70g fat</strong>. That's a ~380 kcal deficit from your TDEE with protein elevated specifically to counteract anabolic resistance at your age. Log every meal — the data is what makes the coaching accurate.`;
    }
    sections += coachSection('Nutrition', 'var(--yellow)', nutText);

    // Section 5: Progress
    let progText = '';
    if (weightLbs) {
      const remaining = +(weightLbs - goalLbs).toFixed(1);
      if (remaining > 5) {
        progText = `At <strong>${weightLbs.toFixed(1)} lbs</strong>, you're ${remaining} lbs from your goal of ${goalLbs} lbs. The mission hasn't changed: reduce visceral fat, preserve muscle, improve sleep, and correct the structural imbalances we've identified. Every session and every meal is a data point. Most of them need to be in the right direction.`;
      } else if (remaining > 0) {
        progText = `You're <strong>${remaining} lbs from your goal</strong> of ${goalLbs} lbs — you're in the final push. This is where most people ease off because the end feels close. Don't. The structural work matters just as much now as when you started. Right-side dominance, shoulder asymmetry, and thoracic stiffness don't fix themselves with weight loss alone.`;
      } else {
        progText = `Weight goal hit at ${weightLbs.toFixed(1)} lbs. The mission now shifts: maintain lean mass, keep reducing visceral fat, and address the structural imbalances that affect how your body moves and ages. The scale is no longer the primary metric.`;
      }
    } else {
      progText = `Keep stacking good days. Sleep → nutrition → training — in that priority order. The right-side dominance and shoulder asymmetry are long-game problems that require consistent, patient work. They will improve with deliberate effort over months, not weeks.`;
    }
    sections += coachSection('Progress & Accountability', 'var(--purple)', progText);

    // Section 6: Watch for
    sections += coachSection('What to Watch', 'var(--text2)',
      `Three things to stay aware of this week: <strong>(1) HR creep</strong> — if you're hitting 125+ bpm during compound lifts, you're working harder than your aerobic system is ready for. Pull back. <strong>(2) Right-side compensation</strong> — in every pulling movement, notice if the right shoulder is doing more work. If it is, reduce load and reinforce the left. <strong>(3) Sleep quality signals</strong> — HRV trending down over 3+ days means your recovery is degrading. The fix is almost always sleep hygiene, not training modification.`
    );

    return `
    <div style="padding:14px 14px 0">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)">
        <div>
          <div style="font-size:16px;font-weight:700;letter-spacing:-0.01em">Daily Coaching Brief</div>
          <div style="font-size:11px;color:var(--text3);margin-top:3px">AI Coach · Updates hourly 6am–9pm</div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <span class="badge badge-yellow">Using snapshot data</span>
        </div>
      </div>
      ${sections}
    </div>
    <div class="spacer"></div>`;
  }
}

/* ══════════════════════════════════════════════════════
   TRENDS TAB
══════════════════════════════════════════════════════ */
function renderTrends(db) {
  const baseline = db.profile.oura_biology_baselines || {};

  const hrvData  = sortAsc(db.recovery_sleep).filter(r=>r.hrv_ms).map(r=>({date:r.date,value:r.hrv_ms}));
  const recData  = sortAsc(db.recovery_sleep).filter(r=>r.recovery_score_pct).map(r=>({date:r.date,value:r.recovery_score_pct}));
  const sleepData= sortAsc(db.recovery_sleep).filter(r=>r.sleep_score_pct).map(r=>({date:r.date,value:r.sleep_score_pct}));
  const wtData   = sortAsc(db.body_composition).filter(e=>e.weight_lbs||e.weight_kg).map(e=>({date:e.date,value:e.weight_lbs||(e.weight_kg*2.2046)}));
  const bfData   = sortAsc(db.body_composition).filter(e=>e.body_fat_pct).map(e=>({date:e.date,value:e.body_fat_pct}));
  const volData  = sortAsc(db.strength_logs).filter(s=>s.volume_kg).map(s=>({date:s.date,value:Math.round(s.volume_kg*2.2046)}));

  const hrv  = buildLineChart(hrvData,  { color:'var(--chart-hrv)',      height:70, baseline:baseline.hrv_baseline_ms||32.5, baselineLabel:`Baseline ${baseline.hrv_baseline_ms||32.5}` });
  const rec  = buildLineChart(recData,  { color:'var(--chart-recovery)', height:60 });
  const slp  = buildLineChart(sleepData,{ color:'var(--chart-sleep)',    height:60 });
  const wt   = buildLineChart(wtData,   { color:'var(--chart-weight)',   height:60, baseline:165, baselineLabel:'Goal 165' });
  const bf   = buildLineChart(bfData,   { color:'var(--chart-bf)',       height:55 });
  const vol  = buildLineChart(volData,  { color:'var(--chart-volume)',   height:60 });

  const latestHrv = hrvData.length  ? hrvData[hrvData.length-1].value   : null;
  const latestRec = recData.length  ? recData[recData.length-1].value   : null;
  const latestSlp = sleepData.length? sleepData[sleepData.length-1].value:null;
  const latestWt  = wtData.length   ? wtData[wtData.length-1].value     : null;
  const latestBf  = bfData.length   ? bfData[bfData.length-1].value     : null;

  // Changes
  const change = (arr) => arr.length >= 2 ? (arr[arr.length-1].value - arr[0].value) : null;
  const hrvChg = change(hrvData);
  const wtChg  = change(wtData);
  const bfChg  = change(bfData);

  function trendCard(title, sub, val, unit, changeVal, chart, labels, opts = {}) {
    const { changeGoodDir = 1, decimals = 1 } = opts; // 1 = up is good, -1 = down is good
    const chgColor = changeVal === null ? 'var(--text3)'
      : (changeVal * changeGoodDir > 0 ? 'var(--green)' : 'var(--red)');
    const chgStr = changeVal !== null
      ? (changeVal > 0 ? '↑' : '↓') + ' ' + Math.abs(changeVal).toFixed(decimals) + unit + ' since first'
      : '';
    return `
    <div class="trend-chart-card">
      <div class="trend-header">
        <div class="trend-title-block">
          <div class="t-title">${title}</div>
          <div class="t-sub">${sub}</div>
        </div>
        <div class="trend-stat-block">
          <div class="t-cur">${val !== null ? (+val).toFixed(decimals) + unit : '—'}</div>
          <div class="t-change" style="color:${chgColor}">${chgStr}</div>
        </div>
      </div>
      <div class="chart-area">${chart.svg}</div>
      <div class="chart-x-labels">${chart.labels.map(l=>`<span>${l}</span>`).join('')}</div>
    </div>`;
  }

  // ── Weekly nutrition summary ──
  const nutEntries = sortAsc(db.nutrition || []);
  // Last 7 days window
  const now7 = new Date();
  const cutoff = new Date(now7); cutoff.setDate(cutoff.getDate() - 7);
  const cutoffStr = cutoff.toISOString().slice(0, 10);
  const weekNut = nutEntries.filter(n => n.date >= cutoffStr);
  const allNut  = nutEntries; // for all-time averages

  function nutAvg(arr, key) {
    const vals = arr.map(n => n.daily_totals ? n.daily_totals[key] : null).filter(v => v !== null && v !== undefined);
    return vals.length ? Math.round(vals.reduce((a,b)=>a+b,0) / vals.length) : null;
  }
  function nutSum(arr, key) {
    const vals = arr.map(n => n.daily_totals ? n.daily_totals[key] : null).filter(v => v !== null && v !== undefined);
    return vals.length ? Math.round(vals.reduce((a,b)=>a+b,0)) : null;
  }

  const wkAvgCal  = nutAvg(weekNut, 'calories_kcal');
  const wkAvgProt = nutAvg(weekNut, 'protein_g');
  const wkAvgCarb = nutAvg(weekNut, 'carbs_g');
  const wkAvgFat  = nutAvg(weekNut, 'fat_g');
  const wkDaysLogged = weekNut.filter(n => n.daily_totals && n.daily_totals.calories_kcal).length;

  const allAvgCal  = nutAvg(allNut, 'calories_kcal');
  const allAvgProt = nutAvg(allNut, 'protein_g');

  function nutColor(val, target) {
    if (!val) return 'var(--text3)';
    const pct = val / target;
    if (pct >= 0.9) return 'var(--green)';
    if (pct >= 0.65) return 'var(--yellow)';
    return 'var(--red)';
  }

  const weekNutHtml = `
  <div class="section">
    <div class="section-title">Weekly Nutrition · Last 7 Days</div>
    <div class="card" style="margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div style="font-size:12px;color:var(--text2)">${wkDaysLogged} of 7 days logged</div>
        ${wkDaysLogged < 4 ? badge('Log more days','yellow') : wkDaysLogged >= 6 ? badge('Great consistency','green') : badge('Getting there','blue')}
      </div>
      <div class="week-grid">
        <div class="week-cell">
          <div class="week-val" style="color:${nutColor(wkAvgCal, 2000)}">${wkAvgCal || '—'}</div>
          <div class="week-lbl">Avg kcal/day</div>
          <div class="week-sub">Target: 2,000</div>
        </div>
        <div class="week-cell">
          <div class="week-val" style="color:${nutColor(wkAvgProt, 150)}">${wkAvgProt || '—'}<span style="font-size:11px">g</span></div>
          <div class="week-lbl">Avg Protein</div>
          <div class="week-sub">Target: 150g</div>
        </div>
        <div class="week-cell">
          <div class="week-val" style="color:${nutColor(wkAvgCarb, 190)}">${wkAvgCarb || '—'}<span style="font-size:11px">g</span></div>
          <div class="week-lbl">Avg Carbs</div>
          <div class="week-sub">Target: 190g</div>
        </div>
      </div>
      <div class="week-grid" style="margin-top:6px">
        <div class="week-cell">
          <div class="week-val" style="color:${nutColor(wkAvgFat, 70)}">${wkAvgFat || '—'}<span style="font-size:11px">g</span></div>
          <div class="week-lbl">Avg Fat</div>
          <div class="week-sub">Target: 70g</div>
        </div>
        <div class="week-cell">
          <div class="week-val" style="color:var(--text2)">${allAvgCal || '—'}</div>
          <div class="week-lbl">All-time avg kcal</div>
          <div class="week-sub">${allNut.length} days logged</div>
        </div>
        <div class="week-cell">
          <div class="week-val" style="color:var(--text2)">${allAvgProt || '—'}<span style="font-size:11px">g</span></div>
          <div class="week-lbl">All-time protein</div>
          <div class="week-sub">avg per day</div>
        </div>
      </div>
      ${weekNut.length > 0 ? `
      <div style="margin-top:10px;border-top:1px solid var(--border);padding-top:10px">
        <div style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px">Day-by-Day</div>
        ${weekNut.slice().reverse().map(n => {
          const c = n.daily_totals ? n.daily_totals.calories_kcal : null;
          const p = n.daily_totals ? n.daily_totals.protein_g : null;
          const pct = c ? Math.min(100, Math.round((c/2000)*100)) : 0;
          return `<div class="data-row" style="padding:6px 0">
            <div class="dr-key" style="font-size:11px">${fmtDate(n.date)}</div>
            <div class="dr-bar"><div class="dr-bar-fill" style="width:${pct}%;background:${nutColor(c,2000)}"></div></div>
            <div class="dr-val" style="font-size:11px">${c ? c+' kcal' : '—'}</div>
            <div class="dr-badge">${p ? badge(p+'g P', p >= 135 ? 'green' : 'yellow') : badge('—','dim')}</div>
          </div>`;
        }).join('')}
      </div>` : ''}
    </div>
  </div>`;

  return `
  <div class="section">
    <div class="section-title">Recovery Signals</div>
    ${trendCard('HRV', `Oura · Baseline ${baseline.hrv_baseline_ms||32.5} ms`, latestHrv, ' ms', hrvChg, hrv, hrv.labels, {changeGoodDir:1})}
    ${trendCard('Recovery Score', 'Oura readiness · 0–100', latestRec, '%', null, rec, rec.labels)}
    ${trendCard('Sleep Score', 'Oura · 0–100', latestSlp, '%', null, slp, slp.labels)}
  </div>

  <div class="section">
    <div class="section-title">Body Composition</div>
    ${trendCard('Weight', 'Goal: 165 lbs', latestWt, ' lbs', wtChg, wt, wt.labels, {changeGoodDir:-1, decimals:1})}
    ${trendCard('Body Fat %', 'Lower is better · Target ~15%', latestBf, '%', bfChg, bf, bf.labels, {changeGoodDir:-1, decimals:1})}
  </div>

  <div class="section">
    <div class="section-title">Training Load</div>
    ${trendCard('Session Volume', `${volData.length} strength sessions`, volData.length ? volData[volData.length-1].value : null, ' lbs', null, vol, vol.labels, {decimals:0})}
  </div>

  ${weekNutHtml}

  <!-- Oura baselines summary -->
  <div class="section">
    <div class="section-title">Biology Baselines · Oura</div>
    <div class="card">
      <div class="data-row">
        <div class="dr-key">VO₂ Max</div>
        <div class="dr-bar"><div class="dr-bar-fill" style="width:40%;background:var(--yellow)"></div></div>
        <div class="dr-val">${baseline.vo2_max||'—'}</div>
        <div class="dr-badge">${badge(baseline.vo2_max_status||'—','yellow')}</div>
      </div>
      <div class="data-row">
        <div class="dr-key">HRV Baseline</div>
        <div class="dr-bar"><div class="dr-bar-fill" style="width:60%;background:var(--accent)"></div></div>
        <div class="dr-val">${baseline.hrv_baseline_ms||'—'} ms</div>
        <div class="dr-badge">${badge('Personal','blue')}</div>
      </div>
      <div class="data-row">
        <div class="dr-key">RHR Baseline</div>
        <div class="dr-bar"><div class="dr-bar-fill" style="width:55%;background:var(--green)"></div></div>
        <div class="dr-val">${baseline.rhr_baseline_bpm||'—'} bpm</div>
        <div class="dr-badge">${badge('Normal','green')}</div>
      </div>
      <div class="data-row">
        <div class="dr-key">Avg Sleep</div>
        <div class="dr-bar"><div class="dr-bar-fill" style="width:58%;background:var(--purple)"></div></div>
        <div class="dr-val">${baseline.avg_sleep_per_night_min ? Math.floor(baseline.avg_sleep_per_night_min/60) + 'h ' + (baseline.avg_sleep_per_night_min%60) + 'm' : '—'}</div>
        <div class="dr-badge">${badge('Chronic debt','yellow')}</div>
      </div>
    </div>
  </div>

  <div class="spacer"></div>`;
}

/* ══════════════════════════════════════════════════════
   TAB SWITCHING
══════════════════════════════════════════════════════ */
function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === 'tab-' + name));
  document.querySelectorAll('.bn-item').forEach(b => b.classList.toggle('active', b.dataset.tab === name));

  if (!rendered[name] && DB) {
    renderTab(name, DB);
  }
}

function renderTab(name, db) {
  const panel = document.getElementById('tab-' + name);
  try {
    switch(name) {
      case 'today':    panel.innerHTML = renderToday(db);    break;
      case 'body':     panel.innerHTML = renderBody(db);     break;
      case 'training': panel.innerHTML = renderTraining(db); break;
      case 'trends':   panel.innerHTML = renderTrends(db);   break;
      case 'coach':    panel.innerHTML = renderCoach(db);    break;
    }
    rendered[name] = true;
  } catch(e) {
    panel.innerHTML = `<div class="error-block">
      <strong>Render error in ${name} tab</strong><br>
      <code>${e.message}</code>
    </div>`;
    console.error(e);
  }
}

/* ══════════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════════ */
async function init() {
  // Topbar date
  const now = new Date();
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('topbar-date').textContent =
    `${days[now.getDay()]} · ${months[now.getMonth()]} ${now.getDate()} · ${now.getFullYear()}`;

  // Tab click
  document.querySelectorAll('.tab-btn, .bn-item').forEach(el => {
    el.addEventListener('click', () => switchTab(el.dataset.tab));
  });

  // Load data
  try {
    const res = await fetch(DB_URL);
    if (!res.ok) throw new Error(`HTTP ${res.status} — could not load ${DB_URL}`);
    DB = await res.json();
    renderTab('today', DB);
  } catch(e) {
    ['today','body','training','trends'].forEach(name => {
      document.getElementById('tab-' + name).innerHTML = `
        <div class="error-block">
          <strong>Could not load HEALTH_DATABASE.json</strong><br>
          ${e.message}<br><br>
          Make sure <code>HEALTH_DATABASE.json</code> is in the same folder as <code>index.html</code> in your GitHub repo.
        </div>`;
    });
  }
}

init();
</script>
